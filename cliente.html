<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E30613">
  <title>Cliente - BENAION DELIVERY</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" alt="Logo Benaion" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
          </div>
          <div class="logo-text">
            <h1 id="clienteNome">Buscando...</h1>
            <p>Painel do Cliente</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="window.Auth.logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="card animate__animated animate__fadeIn" style="background: linear-gradient(135deg, #E30613, #9e040d); color: white; text-align: center; padding: 20px; border-radius: 15px; border: none;">
        <h2 style="margin-bottom: 5px; font-weight: 800;">🚀 Benaion Delivery</h2>
        <p style="opacity: 0.9; font-size: 13px;">Seu pedido em boas mãos em Laranjal do Jari</p>
      </div>

      <button class="btn btn-primary animate__animated animate__pulse animate__infinite" 
              onclick="window.Utils.showModal('novoPedidoModal')" 
              style="font-size: 17px; padding: 18px; width: 100%; margin: 20px 0; border-radius: 15px; font-weight: 800; border: none; box-shadow: 0 8px 15px rgba(227, 6, 19, 0.2);">
        <i class="fas fa-motorcycle"></i> SOLICITAR NOVA ENTREGA
      </button>

      <div class="card" style="background: #fff; margin-bottom: 25px; border-radius: 15px; padding: 15px; border: 1px solid #f0f0f0;">
        <h3 style="margin-bottom: 12px; font-size: 15px; font-weight: 800; color: #333;">🏪 Lojas Parceiras</h3>
        <div id="listaParceiros" style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;">
          </div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h3 style="font-weight: 800; color: #333; font-size: 18px;">📦 Meus Pedidos</h3>
          <span id="contadorPedidos" style="background: #E30613; color: white; padding: 2px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;">0</span>
      </div>
      
      <div id="listaPedidos">
         <div style="text-align: center; padding: 40px; opacity: 0.4;">
            <i class="fas fa-circle-notch fa-spin fa-2x"></i>
            <p style="margin-top: 10px;">Sincronizando com o radar...</p>
         </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active"><i class="fas fa-home"></i><span>Início</span></button>
      <button class="nav-item" onclick="window.Utils.showModal('novoPedidoModal')"><i class="fas fa-plus-circle"></i><span>Pedir</span></button>
      <button class="nav-item" onclick="window.Utils.showToast('Perfil em breve!', 'info')"><i class="fas fa-user"></i><span>Perfil</span></button>
    </nav>
  </div>

  <div class="modal" id="novoPedidoModal">
    <div class="modal-content animate__animated animate__slideInUp">
      <div class="modal-header">
        <h3 class="modal-title">📝 Nova Entrega</h3>
        <button class="modal-close" onclick="window.Utils.hideModal('novoPedidoModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="novoPedidoForm" onsubmit="handleNovoPedido(event)">
          
          <label class="form-label">Onde buscar? (Bairro e Local)</label>
          <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 8px; margin-bottom: 15px;">
            <select class="form-control" id="pedidoBairroRetirada" required onchange="atualizarTaxaEstimada()">
              <option value="centro">Centro</option>
              <option value="Agreste">Agreste</option>
              <option value="Cajari">Cajari</option>
              <option value="Malvinas">Malvinas</option>
              <option value="buritizal">Buritizal</option>
            </select>
            <input type="text" class="form-control" id="pedidoRetiradaLocal" required placeholder="Ex: Pizzaria X">
          </div>

          <label class="form-label">Para onde levar?</label>
          <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 8px; margin-bottom: 15px;">
             <select class="form-control" id="pedidoBairroEntrega" required onchange="atualizarTaxaEstimada()">
               <option value="">Selecione o Bairro</option>
               <option value="centro">Centro</option>
               <option value="Agreste">Agreste</option>
               <option value="Nova esperança">Nova Esperança</option>
               <option value="Cajari">Cajari</option>
               <option value="Sarney">Sarney</option>
               <option value="buritizal">Buritizal</option>
               <option value="monte dourado">Monte Dourado</option>
             </select>
             <input type="text" class="form-control" id="pedidoEntregaLocal" required placeholder="Ex: Casa 123">
          </div>

          <label class="form-label">O que vamos entregar?</label>
          <input type="text" class="form-control" id="pedidoProduto" required placeholder="Ex: 2 Hambúrgueres e 1 Refri">

          <div id="boxTaxa" style="margin-top: 20px; background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #ffebeb;">
             <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 700; color: #666;">Taxa de Entrega:</span>
                <span id="txtTaxaEstimada" style="font-size: 22px; font-weight: 900; color: #E30613;">R$ 6,00</span>
             </div>
          </div>

          <button type="submit" class="btn btn-primary w-100" style="margin-top: 20px; padding: 15px; font-weight: 800; border: none; border-radius: 12px;">
            CONFIRMAR E PEDIR
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script type="module" src="js/api.js"></script>

  <script>
    let currentUser = null;
    let taxaCalculada = 6.00;

    async function initPaginaCliente() {
      if (!window.Auth || !window.API || !window.auth) {
        setTimeout(initPaginaCliente, 300);
        return;
      }

      if (!window.Auth.requireAuth(['cliente'])) return;
      currentUser = window.Auth.getCurrentUser();

      document.getElementById('clienteNome').textContent = "Olá, " + currentUser.name.split(' ')[0];

      // Escuta pedidos em tempo real via Firebase
      window.API.escutarTodosPedidos((todos) => {
          const meusPedidos = todos.filter(p => p.clienteId === currentUser.id);
          document.getElementById('contadorPedidos').textContent = meusPedidos.length;
          renderizarMeusPedidos(meusPedidos);
      });

      carregarParceiros();
    }

    document.addEventListener('DOMContentLoaded', initPaginaCliente);

    function atualizarTaxaEstimada() {
        const ret = document.getElementById('pedidoBairroRetirada').value;
        const ent = document.getElementById('pedidoBairroEntrega').value;
        if (ret && ent && window.API.calcularTaxa) {
            taxaCalculada = window.API.calcularTaxa(ret, ent);
            document.getElementById('txtTaxaEstimada').textContent = window.Utils.formatCurrency(taxaCalculada);
        }
    }

    function renderizarMeusPedidos(pedidos) {
      const container = document.getElementById('listaPedidos');
      if (pedidos.length === 0) {
        container.innerHTML = `
            <div style="text-align: center; padding: 30px; background: white; border-radius: 15px; color: #999;">
                <p>Nenhum pedido no momento.</p>
            </div>`;
        return;
      }

      pedidos.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      container.innerHTML = pedidos.map(p => `
        <div class="card animate__animated animate__fadeInUp" style="margin-bottom: 15px; border-left: 6px solid ${getStatusColor(p.status)}; border-radius: 15px; position: relative;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
             <b style="color: #E30613; font-size: 14px;">#${p.id.substring(0,6).toUpperCase()}</b>
             <span style="background:${getStatusColor(p.status)}; color:white; font-size:10px; padding:4px 10px; border-radius:20px; font-weight:bold;">
                ${window.Utils.getStatusText(p.status).toUpperCase()}
             </span>
          </div>
          <div style="font-size: 13px; color: #555;">
             <p style="margin-bottom: 5px;"><i class="fas fa-store"></i> <b>De:</b> ${p.retiradaLocal} (${p.bairroRetirada})</p>
             <p><i class="fas fa-map-marker-alt"></i> <b>Para:</b> ${p.entregaLocal} (${p.bairro})</p>
          </div>
          <div style="display:flex; justify-content:space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f9f9f9;">
             <span style="font-weight:900; color:#27ae60; font-size: 16px;">${window.Utils.formatCurrency(p.taxaEntrega)}</span>
             ${p.status === 'aguardando_entregador' ? 
               `<button onclick="cancelarMeuPedido('${p.id}')" style="background:none; border:none; color:#999; font-size:11px;"><i class="fas fa-times"></i> CANCELAR</button>` 
               : ''}
          </div>
        </div>
      `).join('');
    }

    async function cancelarMeuPedido(id) {
        if(confirm("Deseja cancelar este pedido?")) {
            try {
                await window.API.deletePedido(id);
                window.Utils.showToast("Pedido cancelado.", "success");
            } catch (e) {
                window.Utils.showToast("Não foi possível cancelar.", "error");
            }
        }
    }

    async function handleNovoPedido(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;

      const data = {
        clienteId: currentUser.id,
        clienteNome: currentUser.name,
        bairroRetirada: document.getElementById('pedidoBairroRetirada').value,
        retiradaLocal: document.getElementById('pedidoRetiradaLocal').value,
        bairro: document.getElementById('pedidoBairroEntrega').value,
        entregaLocal: document.getElementById('pedidoEntregaLocal').value,
        produto: document.getElementById('pedidoProduto').value,
        taxaEntrega: taxaCalculada,
        status: 'aguardando_entregador'
      };

      try {
        await window.API.createPedido(data);
        window.Utils.showToast("Pedido enviado ao radar!", "success");
        window.Utils.hideModal('novoPedidoModal');
        e.target.reset();
      } catch (err) {
        window.Utils.showToast("Erro ao processar.", "error");
      } finally {
        btn.disabled = false;
      }
    }

    function carregarParceiros() {
       const parceiros = [
          {nome: "Pizzaria", img: "https://cdn-icons-png.flaticon.com/512/3132/3132693.png"},
          {nome: "Burguer 10", img: "https://cdn-icons-png.flaticon.com/512/3075/3075977.png"},
          {nome: "Farmácia", img: "https://cdn-icons-png.flaticon.com/512/4320/4320337.png"},
          {nome: "Distribuidora", img: "https://cdn-icons-png.flaticon.com/512/952/952306.png"}
       ];
       document.getElementById('listaParceiros').innerHTML = parceiros.map(p => `
          <div style="text-align: center; min-width: 85px;" onclick="window.Utils.showToast('Loja selecionada: ${p.nome}', 'info')">
             <div style="width: 65px; height: 65px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: 1px solid #eee;">
                <img src="${p.img}" style="width: 40px;">
             </div>
             <p style="font-size: 11px; margin-top: 8px; font-weight: 700; color: #666;">${p.nome}</p>
          </div>
       `).join('');
    }

    function getStatusColor(status) {
      const cores = {'pendente': '#f1c40f', 'aguardando_entregador': '#e67e22', 'aceito': '#3498db', 'em_entrega': '#9b59b6', 'finalizado': '#2ecc71', 'cancelado': '#E30613'};
      return cores[status] || '#999';
    }
  </script>
</body>
</html>
