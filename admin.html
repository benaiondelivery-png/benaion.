<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E30613">
  <title>Admin - BENAION DELIVERY</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" alt="Logo Benaion" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
          </div>
          <div class="logo-text">
            <h1>BENAION DELIVERY</h1>
            <p>Painel Administrativo</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="carregarNotificacoes()" title="Notificações">
            <i class="fas fa-bell"></i>
            <span class="badge" id="notifBadge">0</span>
          </button>
          <button class="header-btn" onclick="window.Auth.logout()" title="Sair">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="page" id="mainContent">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-value" id="statPedidosHoje">0</div>
          <div class="stat-label">Hoje</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-value" id="statPedidosAtivos">0</div>
          <div class="stat-label">Ativos</div>
        </div>
        <div class="stat-card green">
          <div class="stat-value" id="statEntregadoresOnline">0</div>
          <div class="stat-label">Online</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statPedidosMes">0</div>
          <div class="stat-label">Mês</div>
        </div>
      </div>

      <div style="display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px;">
        <button class="btn btn-small btn-primary" onclick="mostrarAba('pedidos')"><i class="fas fa-list"></i> Pedidos</button>
        <button class="btn btn-small btn-outline" onclick="mostrarAba('entregadores')"><i class="fas fa-users"></i> Entregadores</button>
        <button class="btn btn-small btn-outline" onclick="mostrarAba('parceiros')"><i class="fas fa-store"></i> Parceiros</button>
      </div>

      <div id="abaPedidos">
        <div class="card" style="margin-bottom: 15px;">
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="btn btn-small btn-secondary" onclick="filtrarPedidos('todos')">Todos</button>
            <button class="btn btn-small btn-outline" onclick="filtrarPedidos('aguardando_entregador')">Aguardando</button>
            <button class="btn btn-small btn-outline" onclick="filtrarPedidos('em_entrega')">Em Entrega</button>
          </div>
        </div>
        <div id="listaPedidos"></div>
      </div>

      <div id="abaEntregadores" class="hidden"><div id="listaEntregadores"></div></div>

      <div id="abaParceiros" class="hidden">
        <button class="btn btn-primary mb-2" onclick="Utils.showModal('novoParceiroModal')">
          <i class="fas fa-plus"></i> Novo Parceiro
        </button>
        <div id="listaParceiros"></div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" onclick="mostrarAba('pedidos')"><i class="fas fa-list"></i><span>Pedidos</span></button>
      <button class="nav-item" onclick="Utils.showModal('novoPedidoModal')"><i class="fas fa-plus-circle"></i><span>Novo</span></button>
      <button class="nav-item" onclick="mostrarAba('entregadores')"><i class="fas fa-users"></i><span>Logística</span></button>
      <button class="nav-item" onclick="mostrarAba('parceiros')"><i class="fas fa-store"></i><span>Lojas</span></button>
    </nav>
  </div>

  <div class="modal" id="novoPedidoModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">📋 Novo Pedido Manual</h3>
        <button class="modal-close" onclick="Utils.hideModal('novoPedidoModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="novoPedidoForm" onsubmit="criarNovoPedido(event)">
          <div class="form-group">
            <label class="form-label">Cliente *</label>
            <input type="text" class="form-control" id="pedidoNome" required>
          </div>
          <div class="form-group">
            <label class="form-label">O que deseja? *</label>
            <input type="text" class="form-control" id="pedidoProduto" required>
          </div>
          <div class="form-group">
            <label class="form-label">Valor (R$) *</label>
            <input type="number" class="form-control" id="pedidoValor" required step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">Endereço de Entrega *</label>
            <input type="text" class="form-control" id="pedidoEntrega" required>
          </div>
          <div class="form-group">
            <label class="form-label">Bairro *</label>
            <select class="form-control" id="pedidoBairro" required>
              <option value="Laranjal do Jari">Laranjal do Jari</option>
              <option value="Monte Dourado">Monte Dourado</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Lançar Pedido</button>
        </form>
      </div>
    </div>
  </div>

  <div class="modal" id="novoParceiroModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">🏪 Cadastrar Novo Parceiro</h3>
        <button class="modal-close" onclick="Utils.hideModal('novoParceiroModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="novoParceiroForm" onsubmit="criarNovoParceiro(event)">
          <div class="form-group">
            <label class="form-label">Nome Fantasia *</label>
            <input type="text" class="form-control" id="parceiroNome" required>
          </div>
          <div class="form-group">
            <label class="form-label">Endereço *</label>
            <input type="text" class="form-control" id="parceiroEndereco" required>
          </div>
          <div class="form-group">
            <label class="form-label">Telefone *</label>
            <input type="tel" class="form-control" id="parceiroTelefone" required>
          </div>
          <button type="submit" class="btn btn-primary">Cadastrar</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script type="module" src="js/api.js"></script>
  
  <script>
    let currentUser = null;

    async function initAdmin() {
      if (window.Auth && window.API) {
        try {
          // Proteção de nível Admin
          window.Auth.requireAuth(['admin']);
          currentUser = window.Auth.getCurrentUser();
          
          // Carregamento inicial de dados
          await carregarEstatisticas();
          setInterval(carregarEstatisticas, 60000); // Atualiza a cada minuto
        } catch (error) {
          console.error("Falha na autenticação:", error);
        }
      } else {
        setTimeout(initAdmin, 500);
      }
    }

    document.addEventListener('DOMContentLoaded', initAdmin);

    // Funções de interface
    function mostrarAba(aba) {
      document.getElementById('abaPedidos').classList.toggle('hidden', aba !== 'pedidos');
      document.getElementById('abaEntregadores').classList.toggle('hidden', aba !== 'entregadores');
      document.getElementById('abaParceiros').classList.toggle('hidden', aba !== 'parceiros');
      
      // Atualiza botões ativos
      document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    }

    async function carregarEstatisticas() {
      // Aqui entraria a lógica de window.API.getPedidos() para preencher os IDs de stats
      console.log("Estatísticas atualizadas via Firestore");
    }

    async function criarNovoPedido(e) {
      e.preventDefault();
      // Lógica de criação usando window.API.createPedido()
      Utils.showToast("Pedido criado com sucesso!", "success");
      Utils.hideModal('novoPedidoModal');
    }
  </script>
</body>
</html>
