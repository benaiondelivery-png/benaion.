<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E30613">
  <title>Entregador - BENAION DELIVERY</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --status-online: #2ecc71;
      --status-offline: #ccc;
    }
    body { background-color: #f8f9fa; }
    .hidden { display: none !important; }
    .status-dot { font-size: 10px; margin-right: 5px; }
    .online { color: var(--status-online); }
    .offline { color: var(--status-offline); }
    
    .pedido-card {
      background: white;
      border-radius: 15px;
      padding: 18px;
      margin-bottom: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      border-left: 6px solid var(--primary-red);
      transition: transform 0.2s;
    }
    .pedido-card:active { transform: scale(0.98); }

    .btn-aceitar {
      background: var(--primary-red);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: 800;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" alt="Benaion">
          </div>
          <div class="logo-text">
            <h1 id="entregadorNome">Carregando...</h1>
            <p id="txtStatus"><i class="fas fa-circle status-dot offline"></i> Conectando...</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" id="btnStatusHeader" onclick="toggleStatus()">
            <i class="fas fa-power-off"></i>
          </button>
          <button class="header-btn" onclick="window.Auth.logout()">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="page" id="mainContent">
      <div class="card animate__animated animate__fadeIn" style="background: linear-gradient(135deg, var(--primary-red) 0%, #a0040d 100%); color: white; margin-bottom: 20px; border: none; border-radius: 15px;">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center;">
          <div>
            <div style="font-size: 20px; font-weight: 800;" id="statHoje">0</div>
            <div style="font-size: 10px; text-transform: uppercase; opacity: 0.8;">Entregas</div>
          </div>
          <div style="border-left: 1px solid rgba(255,255,255,0.2); border-right: 1px solid rgba(255,255,255,0.2);">
            <div style="font-size: 20px; font-weight: 800;" id="statSaldo">R$ 0</div>
            <div style="font-size: 10px; text-transform: uppercase; opacity: 0.8;">Ganhos</div>
          </div>
          <div>
            <div style="font-size: 20px; font-weight: 800;" id="statBonus">R$ 0</div>
            <div style="font-size: 10px; text-transform: uppercase; opacity: 0.8;">Espera</div>
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="btnTabDisp" class="btn btn-primary" style="flex: 1; font-weight: 700;" onclick="mostrarAba('disponiveis')">
           <i class="fas fa-satellite-dish"></i> RADAR
        </button>
        <button id="btnTabMinhas" class="btn btn-outline" style="flex: 1; font-weight: 700;" onclick="mostrarAba('minhas')">
           <i class="fas fa-route"></i> MINHAS
        </button>
      </div>

      <div id="abaDisponiveis">
        <h3 style="margin-bottom: 15px; font-size: 16px; color: #333;">Pedidos no Radar</h3>
        <div id="listaPedidosDisponiveis">
            <div class="text-center" style="padding: 40px; color: #999;">
                <i class="fas fa-search animate__animated animate__pulse animate__infinite fa-2x"></i>
                <p style="margin-top: 10px;">Procurando entregas...</p>
            </div>
        </div>
      </div>
      
      <div id="abaMinhas" class="hidden">
        <h3 style="margin-bottom: 15px; font-size: 16px; color: #333;">Entregas em Curso</h3>
        <div id="listaMinhasEntregas"></div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" onclick="mostrarAba('disponiveis')">
        <i class="fas fa-motorcycle"></i><span>Radar</span>
      </button>
      <button class="nav-item" onclick="window.Utils.showToast('Tabela de Preços em breve', 'info')">
        <i class="fas fa-list-alt"></i><span>Preços</span>
      </button>
      <button class="nav-item" onclick="toggleStatus()">
        <i class="fas fa-circle" id="navIconStatus"></i><span id="navTextStatus">Offline</span>
      </button>
    </nav>
  </div>

  <script src="js/utils.js"></script>
  <script type="module" src="js/api.js"></script>

  <script>
    let currentUser = null;
    let pedidosEscutados = [];

    async function initEntregador() {
      if (!window.Auth || !window.API || !window.auth) {
        setTimeout(initEntregador, 300);
        return;
      }

      if (!window.Auth.requireAuth(['entregador'])) return;
      currentUser = window.Auth.getCurrentUser();
      
      document.getElementById('entregadorNome').textContent = "Olá, " + currentUser.name.split(' ')[0];
      
      // Sincroniza o status Online do Firestore
      const perfil = await window.API.getUserProfile(currentUser.id);
      currentUser.online = perfil?.online || false;
      sincronizarUIStatus(currentUser.online);

      // Inicia o Radar Benaion
      window.API.escutarTodosPedidos((pedidos) => {
          pedidosEscutados = pedidos;
          renderizarListas();
          atualizarEstatisticas();
      });
    }

    function sincronizarUIStatus(isOnline) {
      const txt = document.getElementById('txtStatus');
      const iconNav = document.getElementById('navIconStatus');
      const textNav = document.getElementById('navTextStatus');
      const btnHeader = document.getElementById('btnStatusHeader');

      if (isOnline) {
        txt.innerHTML = '<i class="fas fa-circle status-dot online"></i> No Radar';
        iconNav.style.color = "#2ecc71";
        textNav.textContent = "Online";
        btnHeader.style.color = "#2ecc71";
      } else {
        txt.innerHTML = '<i class="fas fa-circle status-dot offline"></i> Offline';
        iconNav.style.color = "#ccc";
        textNav.textContent = "Offline";
        btnHeader.style.color = "#ccc";
      }
    }

    async function toggleStatus() {
      const novoStatus = !currentUser.online;
      try {
        await window.API.updateUser(currentUser.id, { online: novoStatus });
        currentUser.online = novoStatus;
        sincronizarUIStatus(novoStatus);
        window.Utils.showToast(novoStatus ? "Radar Ativado!" : "Você saiu do Radar", "info");
        renderizarListas();
      } catch (e) {
        window.Utils.showToast("Erro ao mudar status", "error");
      }
    }

    function renderizarListas() {
      const dispContainer = document.getElementById('listaPedidosDisponiveis');
      const minhasContainer = document.getElementById('listaMinhasEntregas');

      const disponiveis = pedidosEscutados.filter(p => (p.status === 'aguardando_entregador' || p.status === 'pronto') && currentUser.online);
      const minhas = pedidosEscutados.filter(p => p.entregadorId === currentUser.id && p.status !== 'finalizado');

      // Render Radar
      if (disponiveis.length === 0) {
        dispContainer.innerHTML = `<p class="text-center py-4" style="color:#999;">${currentUser.online ? 'Nenhum pedido no momento.' : 'Fique ONLINE para ver pedidos.'}</p>`;
      } else {
        dispContainer.innerHTML = disponiveis.map(p => `
          <div class="pedido-card animate__animated animate__bounceIn">
            <div style="display:flex; justify-content:space-between; align-items:start;">
              <div>
                <span style="font-size:10px; background:#eee; padding:2px 6px; border-radius:5px;">${p.origem || 'AVULSO'}</span>
                <p style="margin-top:5px;"><b>De:</b> ${p.bairroRetirada}</p>
                <p><b>Para:</b> ${p.bairro}</p>
              </div>
              <div style="text-align:right;">
                <span style="color:var(--primary-red); font-size:20px; font-weight:800;">${window.Utils.formatCurrency(p.taxaEntrega)}</span>
              </div>
            </div>
            <button class="btn-aceitar" onclick="aceitarCorrida('${p.id}')">ACEITAR CORRIDA</button>
          </div>
        `).join('');
      }

      // Render Minhas
      if (minhas.length === 0) {
        minhasContainer.innerHTML = '<p class="text-center py-4" style="color:#999;">Nenhuma entrega em curso.</p>';
      } else {
        minhasContainer.innerHTML = minhas.map(p => `
          <div class="card" style="border-left: 6px solid #3498db; margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between;">
              <b>Pedido #${p.id.substring(0,6).toUpperCase()}</b>
              <span class="badge" style="background:#3498db; color:white; font-size:10px;">${window.Utils.getStatusText(p.status)}</span>
            </div>
            <div style="margin:10px 0; font-size:13px;">
              <p><i class="fas fa-map-marker-alt"></i> Destino: ${p.bairro}</p>
              <p><i class="fas fa-box"></i> Itens: ${p.produto || p.descricao}</p>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
              <button class="btn btn-small btn-outline" onclick="window.Utils.openGoogleMaps('${p.bairroRetirada}', '${p.bairro}')">ROTA</button>
              <button class="btn btn-small btn-success" style="background:#2ecc71; color:white; border:none;" onclick="finalizarEntrega('${p.id}')">CONCLUIR</button>
            </div>
          </div>
        `).join('');
      }
    }

    async function aceitarCorrida(id) {
      try {
        await window.API.updatePedido(id, {
          entregadorId: currentUser.id,
          entregadorNome: currentUser.name,
          status: 'aceito',
          aceito_em: Date.now()
        });
        window.Utils.vibrate([100, 50, 100]);
        window.Utils.showToast("Corrida aceita! Boa sorte.", "success");
        mostrarAba('minhas');
      } catch (e) {
        window.Utils.showToast("Outro entregador aceitou primeiro.", "error");
      }
    }

    async function finalizarEntrega(id) {
      if (confirm("Confirma que entregou o pedido?")) {
        await window.API.updatePedido(id, { 
          status: 'finalizado',
          finalizado_em: Date.now()
        });
        window.Utils.showToast("Parabéns! Mais um pra conta.", "success");
      }
    }

    function atualizarEstatisticas() {
      const hoje = new Date().toLocaleDateString();
      const concluidosHoje = pedidosEscutados.filter(p => 
        p.entregadorId === currentUser.id && 
        p.status === 'finalizado' &&
        new Date(p.finalizado_em || Date.now()).toLocaleDateString() === hoje
      );

      const ganhos = concluidosHoje.reduce((acc, p) => acc + (p.taxaEntrega || 0), 0);
      
      document.getElementById('statHoje').textContent = concluidosHoje.length;
      document.getElementById('statSaldo').textContent = window.Utils.formatCurrency(ganhos);
    }

    function mostrarAba(aba) {
      document.getElementById('abaDisponiveis').classList.toggle('hidden', aba !== 'disponiveis');
      document.getElementById('abaMinhas').classList.toggle('hidden', aba !== 'minhas');
      document.getElementById('btnTabDisp').className = aba === 'disponiveis' ? 'btn btn-primary' : 'btn btn-outline';
      document.getElementById('btnTabMinhas').className = aba === 'minhas' ? 'btn btn-primary' : 'btn btn-outline';
    }

    document.addEventListener('DOMContentLoaded', initEntregador);
  </script>
</body>
</html>
